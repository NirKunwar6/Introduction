<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nir Kunwar | 3D World</title>

<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
margin:0;
overflow-x:hidden;
background:black;
color:white;
font-family:Poppins;
}

#bg {
position:fixed;
top:0;
left:0;
z-index:-1;
}

section {
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

h1 {
font-family:Syncopate;
font-size:3rem;
}

.menu {
position:fixed;
top:20px;
right:20px;
z-index:10;
display:flex;
flex-direction:column;
gap:10px;
}

.menu a {
color:white;
text-decoration:none;
background:#111;
padding:10px;
border-right:3px solid gold;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="menu">
<a href="#home">Home</a>
<a href="#about">About</a>
<a href="#achievements">Achievements</a>
</div>

<section id="home"><h1>NIR KUNWAR</h1></section>
<section id="about"><h1>CRICKETER + DEVELOPER</h1></section>
<section id="achievements"><h1>ELITE PERFORMANCE</h1></section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
// SCENE
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("bg"),alpha:true});
renderer.setSize(innerWidth,innerHeight);

// LIGHTS
const light1 = new THREE.PointLight(0xffffff,1);
light1.position.set(5,5,5);
scene.add(light1);

const light2 = new THREE.PointLight(0xD4AF37,1);
light2.position.set(-5,-5,5);
scene.add(light2);

// ===== 3D CRICKET BAT =====
const batGroup = new THREE.Group();

// HANDLE
const handleGeo = new THREE.CylinderGeometry(0.1,0.15,2,32);
const handleMat = new THREE.MeshStandardMaterial({color:0x333333});
const handle = new THREE.Mesh(handleGeo,handleMat);
handle.position.y = 1.5;

// BLADE
const bladeGeo = new THREE.BoxGeometry(0.8,3,0.2);
const bladeMat = new THREE.MeshStandardMaterial({color:0xD4AF37});
const blade = new THREE.Mesh(bladeGeo,bladeMat);
blade.position.y = -0.5;

batGroup.add(handle);
batGroup.add(blade);

scene.add(batGroup);

// STARS
const starsGeo = new THREE.BufferGeometry();
const stars = [];

for(let i=0;i<1500;i++){
stars.push((Math.random()-0.5)*200);
}
starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(stars,3));

const starsMat = new THREE.PointsMaterial({color:0xffffff});
const starMesh = new THREE.Points(starsGeo,starsMat);
scene.add(starMesh);

// ===== SCROLL CAMERA CONTROL =====
let scrollY = 0;

window.addEventListener("scroll", ()=>{
scrollY = window.scrollY;
});

// ===== MOUSE INTERACTION =====
document.addEventListener("mousemove",(e)=>{
batGroup.rotation.y = e.clientX * 0.002;
batGroup.rotation.x = e.clientY * 0.002;
});

// ANIMATION
function animate(){
requestAnimationFrame(animate);

// smooth rotation
batGroup.rotation.z += 0.01;

// CAMERA TRANSITION (INSANE EFFECT)
camera.position.y = -scrollY * 0.01;
camera.position.z = 6 + scrollY * 0.002;

renderer.render(scene,camera);
}

animate();

// RESPONSIVE
window.addEventListener("resize", ()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
